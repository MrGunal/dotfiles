import = [
  "~/.config/alacritty/catppuccin-mocha.toml",
]

[env]
TERM = "xterm-256color"

# Adjust this value between 0.0 (transparent) and 1.0 (opaque)
[window]
opacity = 0.6
decorations = "none"
#padding = {x= 5,y = 5}

[font]
size = 9.0

[font.bold]
# family = "MesloLGS NF"
family = "MesloLGS NF"
style = "Bold"

[font.bold_italic]
# family = "MesloLGS NF"
family = "MesloLGS NF"
style = "Bold Italic"

[font.italic]
# family = "MesloLGS NF"
family = "MesloLGS NF"
style = "Italic"

[font.normal]
# family = "MesloLGS NF"
family = "MesloLGS NF"
style = "Regular"

